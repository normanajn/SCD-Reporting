{% extends "base.html" %}
{% block title %}Delete Entry — SCD Reporting{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="bg-white rounded-lg border border-red-200 shadow-sm p-6">
    <h1 class="text-xl font-bold text-slate-900 mb-2">Delete entry?</h1>
    <p class="text-sm text-slate-600 mb-1">
      You are about to permanently delete:
    </p>
    <p class="font-medium text-slate-800 mb-4">"{{ object.title }}"</p>
    <p class="text-xs text-slate-400 mb-6">This action cannot be undone.</p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
        Yes, delete
      </button>
      <a href="{% url 'entries:detail' object.pk %}"
         class="text-sm text-slate-500 hover:underline self-center">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
