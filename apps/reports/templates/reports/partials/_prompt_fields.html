{# Swappable prompt textarea content — loaded via HTMX when a template is selected. #}
{# Also rendered inline on initial page load. #}
<input type="hidden" name="template_name" id="template-name-field" value="{{ template_name|default:'' }}">

<div>
  <label class="block text-xs font-semibold text-slate-600 mb-1">System prompt</label>
  <p class="text-xs text-slate-400 mb-1">Sets Claude's persona, tone, and ground rules.</p>
  <textarea name="system_prompt" rows="5"
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-xs font-mono shadow-sm
                   focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">{{ system_prompt }}</textarea>
</div>

<div>
  <label class="block text-xs font-semibold text-slate-600 mb-1">User template</label>
  <p class="text-xs text-slate-400 mb-1">
    The message sent with each request. Use <code class="bg-slate-100 px-1 rounded">{entries}</code> where the entry data should be inserted.
  </p>
  <textarea name="user_template" rows="14"
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-xs font-mono shadow-sm
                   focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">{{ user_template }}</textarea>
</div>
