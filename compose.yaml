services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scd}
      POSTGRES_USER: ${POSTGRES_USER:-scd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scd}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: scd_reporting.settings.prod
      DATABASE_URL: postgres://${POSTGRES_USER:-scd}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-scd}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      SCD_HOSTNAME: ${SCD_HOSTNAME:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - staticfiles:/srv/static:ro
      - media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  staticfiles:
  media:
  caddy_data:
  caddy_config:
