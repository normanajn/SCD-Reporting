apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-caddyfile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scd-reporting.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {$SCD_HOSTNAME} {
        file_server /static/* {
            root /srv
        }
        file_server /media/* {
            root /srv
        }
        reverse_proxy web:8000
    }
