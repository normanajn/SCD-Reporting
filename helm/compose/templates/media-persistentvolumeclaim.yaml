apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-media
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scd-reporting.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.pvc.media.accessMode }}
  resources:
    requests:
      storage: {{ .Values.pvc.media.size }}
